<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskMate</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/docx@8.4.0/build/index.umd.js"></script>
  <script src="main.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>📋 TaskMate</h1>
    <p class="subtitle">O seu gestor pessoal de tarefas</p>
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Digite uma nova tarefa..." />
      <button id="addTaskBtn">Adicionar</button>
    </div>
    <ul id="taskList"></ul>
    <button id="exportBtn">Exportar para Word</button>
    <p class="note">Dica: Clique uma vez para marcar, clique duas vezes para remover</p>
  </div>
</body>
</html>
