<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskMate</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/docx@8.4.0/build/index.umd.js"></script>
  <script src="main.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>?? TaskMate</h1>
    <p class="subtitle">Organize suas tarefas de forma simples e eficiente</p>

    <!-- DASHBOARD -->
    <div class="dashboard">
      <div class="card">
        <h3>Total</h3>
        <p id="totalTasks">0</p>
      </div>

      <div class="card">
        <h3>Concluídas</h3>
        <p id="completedTasks">0</p>
      </div>

      <div class="card">
        <h3>Pendentes</h3>
        <p id="pendingTasks">0</p>
      </div>
    </div>

    <!-- BARRA DE PROGRESSO -->
    <div class="progress-bar">
      <div id="progress"></div>
    </div>

    <!-- INPUT -->
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Digite uma nova tarefa..." />
      <button id="addTaskBtn">Adicionar</button>
    </div>

    <!-- LISTA -->
    <ul id="taskList"></ul>

    <!-- BOTĂO EXPORTAR -->
    <button id="exportBtn">Exportar para Word</button>

    <p class="note">Clique 1x: concluir | 2x: remover</p>
  </div>
</body>
</html>
